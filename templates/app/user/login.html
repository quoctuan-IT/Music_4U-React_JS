{% extends "base_auth.html" %}

{% load static %}

{% block title %}Login{% endblock %}

{% block content %}

<form method="POST">
    {% csrf_token %}

    <img alt="" class="mb-4" height="200" src="{% static 'images/logo-IT.png' %}" width="200">
    <h1 class="h3 mb-3 fw-normal">LOGIN</h1>

    <div class="form-floating mb-3">
        <input autofocus class="form-control" id="username" name="username" placeholder="" required type="text">
        <label class="form-label" for="username">Username</label>
    </div>

    <div class="form-floating mb-3">
        <input class="form-control" id="password" name="password" placeholder="" required type="password">
        <label class="form-label" for="password">Password</label>
    </div>

    <p class="mt-3 text-center">
        Dont't have account? <a class="text-info" href="{% url 'register' %}">Register</a>
    </p>

    <button class="btn w-100 py-2 text-black" style="background-color: pink;" type="submit">LOGIN</button>
</form>

{% endblock %}
