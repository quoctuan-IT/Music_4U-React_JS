{% load static %}

<div class="card border border-secondary border-opacity-25 shadow-lg rounded-4 overflow-hidden shadow-pink-glow">
    <div class="card-body p-4 text-center">
        <h6 class="text-pink text-uppercase tracking-widest small fw-bold mb-4">Now Playing</h6>
        
        <div class="player-disc-wrapper mb-4 position-relative d-inline-block">
            <div class="disc-hole"></div>
            <img id="playerCover" src="{% static 'images/logo-IT.png' %}" 
                 class="rounded-circle shadow-lg border border-5 border-white rotate-anim" 
                 style="width: 200px; height: 200px; object-fit: cover;">
        </div>

        <h5 id="nowPlaying" class="text-white fw-bold text-truncate mb-1">Select a track</h5>
        <p id="nowArtist" class="text-secondary small mb-4">Ready to play</p>

        <audio id="audioPlayer"></audio>

        <div class="px-2 mb-4">
            <input type="range" class="form-range custom-range" id="progressBar" value="0" min="0" max="100">
            <div class="d-flex justify-content-between mt-1">
                <span id="currentTime" small>0:00</span>
                <span id="durationTime" small>0:00</span>
            </div>
        </div>

        <div class="d-flex justify-content-center align-items-center gap-4">
            <button class="btn btn-close-white p-0 hover-pink" onclick="playPreviousSong()">
                <i class="bi bi-skip-start-fill fs-2"></i>
            </button>

            <button class="btn btn-close-white rounded-circle d-flex align-items-center justify-content-center shadow-lg play-btn" 
                    onclick="togglePlay()" id="mainPlayBtn">
                <i class="bi bi-play-fill fs-2" id="playIcon"></i>
            </button>
            
            <button class="btn btn-close-white p-0 hover-pink" onclick="playNextSong()">
                <i class="bi bi-skip-end-fill fs-2"></i>
            </button>
        </div>
    </div>
</div>

<style>
    .rotate-anim {
        animation: rotate 10s linear infinite;
        animation-play-state: paused;
        transition: border 0.3s ease;
    }

    @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .disc-hole {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 18px;
        height: 18px;
        background: #000000;
        border-radius: 50%;
        z-index: 10;
        border: 2px solid rgb(255, 255, 255);
    }
    
    .play-btn { width: 60px; height: 60px; transition: transform 0.2s; }
    .play-btn:active { transform: scale(0.9); }
    .hover-white:hover { color: white !important; }

    .custom-range::-webkit-slider-runnable-track {
        background: rgba(255, 255, 255, 0.3);
        height: 6px;
        border-radius: 3px;
    }
    .custom-range::-webkit-slider-thumb {
        background: var(--accent-pink);
        margin-top: -4px;
        box-shadow: 0 0 10px var(--accent-pink);
    }
</style>
