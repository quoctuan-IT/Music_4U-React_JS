{% load static %}

<nav class="navbar navbar-expand-lg navbar-dark fixed-top navbar-glass">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'index' %}">
            <div class="logo-wrapper d-flex align-items-center justify-content-center rounded-circle me-2">
                <img alt="Logo" class="rounded-circle" height="36" src="{% static 'images/logo-IT.png' %}" width="36">
            </div>
            <span class="fw-bold fs-3 text-uppercase brand-text text-pink">PQT 🤍 M4U</span>
        </a>

        <button aria-controls="navbarContent" aria-expanded="false" class="navbar-toggler border-0 shadow-none" 
                data-bs-target="#navbarContent" data-bs-toggle="collapse" type="button">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-3 text-center">
                <li class="nav-item">
                    <a class="nav-link px-3 py-2 rounded-pill {% if request.resolver_match.url_name == 'index' %}active-link{% endif %}" href="{% url 'index' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3 py-2 rounded-pill {% if request.resolver_match.url_name == 'artists' %}active-link{% endif %}" href="{% url 'artists' %}">Artists</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3 py-2 rounded-pill {% if request.resolver_match.url_name == 'songs' %}active-link{% endif %}" href="{% url 'songs' %}">Songs</a>
                </li>
            </ul>

            <div class="d-flex align-items-center justify-content-center gap-3 py-3 py-lg-0">
                {% if user.is_authenticated %}
                <div class="dropdown w-100 text-center">
                    <a class="btn btn-outline-pink btn-sm rounded-pill dropdown-toggle px-3 w-sm-100" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle me-1"></i> {{ user.username }}
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end custom-dropdown bg-dark border-secondary shadow-lg">
                        <li><a class="dropdown-item text-white py-2" href="{% url 'profile' %}"><i class="bi bi-person me-2"></i>Profile</a></li>
                        <li><hr class="dropdown-divider bg-secondary opacity-25"></li>
                        <li><a class="dropdown-item text-danger py-2" href="{% url 'logout' %}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                    </ul>
                </div>
                {% else %}
                <a class="btn btn-outline-pink px-3 shadow-sm fw-bold" href="{% url 'login' %}">
                    <i class="bi bi-person me-2"></i>Login
                </a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<style>
    /* Glassmorphism Effect */
    .navbar-glass {
        background-color: rgba(50, 0, 25, 0.2);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        padding-top: 0.8rem;
        padding-bottom: 0.8rem;
        border-bottom: 1px solid rgb(25, 25, 25);
    }

    .logo-wrapper {
        width: 40px;
        height: 40px;
        border: 1px solid var(--accent-pink);
        transition: transform 0.3s ease;
    }

    .navbar-brand:hover .logo-wrapper {
        transform: rotate(15deg) scale(1.1);
    }

    /* Nav Links */
    .nav-link {
        color: #ffffff !important;
        font-weight: 600;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .nav-link:hover, .nav-link.active-link {
        color: #000 !important;
        background-color: var(--accent-pink) !important;
        box-shadow: 0 4px 15px rgba(255, 45, 85, 0.4);
    }

    /* Fix Dropdown Menu */
    .custom-dropdown {
        margin-top: 10px !important;
        border-radius: 12px;
        min-width: 180px;
    }

    .dropdown-item {
        transition: all 0.2s ease;
        font-weight: 500;
    }

    .dropdown-item:hover {
        background-color: rgba(255, 45, 85, 0.15) !important;
        color: var(--accent-pink) !important;
    }

    /* Mobile Responsive Fixes */
    @media (max-width: 991.98px) {
        .navbar-collapse {
            background: rgba(10, 10, 10, 0.98);
            padding: 1.5rem;
            border-radius: 20px;
            margin-top: 1rem;
            border: 1px solid rgba(255, 45, 85, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Fix dropdown bị lệch trên mobile */
        .dropdown-menu {
            position: static !important;
            float: none !important;
            width: 100% !important;
            margin-top: 1rem !important;
            background-color: rgba(255, 255, 255, 0.05) !important;
            border: none !important;
            text-align: center;
        }

        .dropdown-item {
            padding: 12px !important;
        }

        .dropdown-toggle::after {
            display: inline-block;
        }
    }

    /* Smooth transition for toggler */
    .navbar-toggler:focus {
        box-shadow: none;
    }
</style>
