<div class="container mt-5 mb-5">
    <div class="p-4 rounded-4 shadow bg-black">
        <form action="{% url 'search' %}" class="row g-3 align-items-end justify-content-center" method="get">
            <div class="col-lg-5 col-md-5 col-12">
                <label class="form-label fw-bold text-pink" for="searchInput">
                    <i class="bi bi-search-heart"></i> Search
                </label>
                
                <input class="form-control rounded-pill bg-dark text-white border-secondary shadow-none custom-focus" 
                       id="searchInput" name="query" placeholder="Enter Song title or Artist"
                       type="text" value="{{ query }}">
            </div>

            <div class="col-lg-4 col-md-4 col-12">
                <label class="form-label fw-bold text-pink" for="genreSelect">
                    <i class="bi bi-funnel"></i> Genre
                </label>

                <select class="form-select rounded-pill bg-dark text-white border-secondary shadow-none custom-focus" 
                        id="genreSelect" name="genre">
                    <option value="">All Genres</option>
                    {% for genre in genres %}
                    <option value="{{ genre.id }}" {% if genre.id|stringformat:"s" == selected_genre %}selected{% endif %}>
                        {{ genre.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-lg-2 col-md-3 col-6 d-grid">
                <button class="btn btn-pink rounded-pill fw-bold" type="submit">
                    Search
                </button>
            </div>
        </form>

        {% if query or selected_genre %}
        <div class="text-center mt-3">
            <a class="btn btn-sm btn-outline-info rounded-pill py-2 px-4 transition-base" href="{% url 'index' %}">
                <i class="bi bi-x-circle me-1"></i> Clear Filters
            </a>
        </div>
        {% endif %}
    </div>
</div>

<style>
    .custom-focus:focus {
        border-color: var(--accent-pink) !important;
        background-color: #111 !important;
        box-shadow: 0 0 8px rgba(255, 133, 162, 0.3) !important;
        color: white !important;
    }
    
    .form-select option {
        background-color: #000;
        color: white;
    }

    @media (max-width: 767.98px) {
        .btn-pink {
            padding-top: 10px;
            padding-bottom: 10px;
        }
    }
</style>
